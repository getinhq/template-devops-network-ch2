services:
  lb:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app1
      - app2
  app1:
    image: nginx:alpine
    volumes:
      - ./content1:/usr/share/nginx/html:ro
  app2:
    image: nginx:alpine
    volumes:
      - ./content2:/usr/share/nginx/html:ro
